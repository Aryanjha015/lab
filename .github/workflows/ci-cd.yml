name: Python CI/CD
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint code (Syntax & Logic Only)
        run: |
          # Fails only on critical logic/syntax errors (E9, F63, F7, F82)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=term --cov-fail-under=80

      - name: Validate script output
        run: |
          # xargs trims any accidental trailing whitespace or hidden newlines
          output=$(python app.py | xargs)
          if [ "$output" != "5" ]; then
            echo "Unexpected output: '$output'"
            exit 1
          fi

      - name: Deploy Application
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying application..."
          echo "Deployment successful and verified!"
